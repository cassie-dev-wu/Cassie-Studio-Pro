<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workflow - Cassie Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #1d1d1f; line-height: 1.6; }

/* 顶部导航 */
nav { 
  padding: 20px 5%; 
  display: flex; 
  justify-content: space-between; 
  position: sticky; 
  top: 0; 
  background: rgba(255,255,255,0.8); 
  backdrop-filter: blur(10px);
  z-index: 10;
}
.back-link { text-decoration: none; color: #0071e3; font-weight: 500; font-size: 0.9rem; }

/* 内容主体 */
.container { max-width: 900px; margin: 60px auto; padding: 0 5%; }
.tag-wrapper { margin-bottom: 20px; }
.tag { display: inline-block; padding: 4px 12px; background: #f5f5f7; border-radius: 20px; font-size: 0.75rem; color: #86868b; margin-right: 8px; font-weight: 600; }

h1 { font-size: clamp(2.5rem, 5vw, 4rem); margin-bottom: 40px; letter-spacing: -0.04em; font-weight: 700; }

.intro-text { font-size: 1.4rem; color: #424245; margin-bottom: 80px; max-width: 700px; font-weight: 400; }

/* 步骤块：增加边框和阴影 */
.step-grid { display: grid; gap: 30px; margin-bottom: 100px; }
.step { 
  padding: 40px; 
  background: #fbfbfd; 
  border-radius: 24px; 
  border: 1px solid #d2d2d7; 
  transition: 0.3s;
}
.step:hover { border-color: #0071e3; transform: scale(1.02); }
.step-num { color: #0071e3; font-weight: 700; font-size: 1.2rem; margin-bottom: 15px; display: block; }
.step h3 { font-size: 1.5rem; margin-bottom: 12px; }
.step p { color: #6e6e73; font-size: 1rem; }

/* 底部行动栏：增加页面“分量” */
footer {
  background: #1d1d1f;
  color: #fff;
  padding: 80px 5%;
  text-align: center;
}
.footer-content h2 { font-size: 2rem; margin-bottom: 20px; }
.contact-btn { 
  display: inline-block; 
  padding: 15px 40px; 
  background: #fff; 
  color: #1d1d1f; 
  text-decoration: none; 
  border-radius: 30px; 
  font-weight: 600;
  margin-top: 20px;
  transition: 0.3s;
}
.contact-btn:hover { background: #0071e3; color: #fff; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="back-link">← 返回 Cassie Studio</a>

  <div class="step-grid">
    <div class="step">
      <span class="step-num">01.</span>
      <h3>需求诊断</h3>
      <p>分析你目前最耗时的重复性任务，确定 AI 介入的最佳节点，告别无效劳动。</p>
    </div>
    
    <div class="step">

      <h3>落地交付</h3>
      <p>提供开箱即用的自动化方案，无需学习复杂代码，上手即用。</p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-content">

    <p>联系我，开始你的第一个 AI 工作流定制项目。</p>

  </div>
</footer>

</body>
</html>
